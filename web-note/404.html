<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | anote.cc</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --card: rgba(255,255,255,0.9);
      --text: #172033;
      --muted: #66758f;
      --accent: #167c78;
      --line: rgba(23,32,51,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 30%),
        radial-gradient(circle at bottom right, rgba(22,124,120,0.10), transparent 24%),
        linear-gradient(135deg, var(--bg) 0%, #e8eef8 100%);
    }
    main {
      width: min(92vw, 560px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      text-align: center;
      box-shadow: 0 24px 70px rgba(16,26,43,0.10);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 48px;
      line-height: 1;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 16px;
    }
    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>The page you requested does not exist.</p>
    <a href="/">Open a note</a>
  </main>
</body>
</html>
